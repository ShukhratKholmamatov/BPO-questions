<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BPO-Logistics Sector Survey</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1a2230; --muted:#5b6779;
    --line:#e2e7ef; --accent:#0f6f8c; --accent-ink:#ffffff;
    --accent-soft:#e6f2f5; --warn:#8a3ffc; --danger:#b3261e;
    --radius:14px; --shadow:0 1px 3px rgba(16,32,48,.06),0 8px 24px rgba(16,32,48,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1520; --card:#161d2b; --ink:#e8edf5; --muted:#9aa7ba;
      --line:#26303f; --accent:#37b0cf; --accent-ink:#08131a;
      --accent-soft:#16303a; --warn:#c39bff; --danger:#ff6b64;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  header.top{position:sticky;top:0;z-index:20;background:var(--card);
    border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
  .top-inner{max-width:860px;margin:0 auto;padding:12px 20px;display:flex;
    align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;flex:1;min-width:180px}
  .brand b{font-size:16px;letter-spacing:.2px}
  .brand span{font-size:12px;color:var(--muted)}
  .langsw{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);
    border-radius:999px;padding:3px}
  .langsw button{border:0;background:transparent;color:var(--muted);
    padding:6px 12px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
  .langsw button.active{background:var(--accent);color:var(--accent-ink)}
  main{max-width:860px;margin:0 auto;padding:26px 20px 120px}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 22px 20px;box-shadow:var(--shadow);margin-bottom:22px}
  .hero h1{margin:0 0 6px;font-size:22px}
  .hero p{margin:6px 0;color:var(--muted);font-size:14.5px}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);
    color:var(--accent);border-radius:999px;padding:5px 12px;font-size:12.5px;
    font-weight:700;margin-bottom:12px}
  .anon{border:1px dashed var(--line);background:var(--bg);border-radius:12px;
    padding:12px 14px;font-size:13.5px;color:var(--muted);margin-top:14px}
  .section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
  .section>h2{margin:0 0 4px;font-size:17px;display:flex;align-items:center;gap:10px}
  .section .kicker{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:1px;
    text-transform:uppercase}
  .section .sintro{color:var(--muted);font-size:13.5px;margin:2px 0 6px}
  .q{padding:16px 0;border-top:1px solid var(--line)}
  .q:first-of-type{border-top:0}
  .q>label.qlabel,.q>.qlabel{display:block;font-weight:650;font-size:15px;margin-bottom:9px}
  .q .help{color:var(--muted);font-size:12.8px;margin:-4px 0 9px}
  .req{color:var(--danger);font-weight:700}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;cursor:pointer;background:var(--bg);
    transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--accent)}
  .opt input{margin-top:3px;accent-color:var(--accent);width:16px;height:16px;flex:none}
  .opt.checked{border-color:var(--accent);background:var(--accent-soft)}
  .opt span{font-size:14px}
  input[type=number],input[type=text],textarea,select{
    width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);
    color:var(--ink);padding:10px 12px;font-size:14px;font-family:inherit}
  input[type=number]{max-width:180px}
  textarea{min-height:82px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}
  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  table.grid{border-collapse:collapse;width:100%;min-width:420px;font-size:13.5px}
  table.grid th,table.grid td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left}
  table.grid thead th{background:var(--bg);color:var(--muted);font-size:12px;
    font-weight:700;position:sticky;top:0}
  table.grid td.num{width:110px}
  table.grid input[type=number]{max-width:92px;padding:7px 8px}
  table.grid.scale th.sc,table.grid.scale td.sc{text-align:center;width:1%;white-space:nowrap}
  table.grid.scale td.sc input{accent-color:var(--accent)}
  table.grid tr:last-child td{border-bottom:0}
  .rolebar{display:flex;flex-wrap:wrap;gap:9px}
  .rolebar .opt{flex:1 1 220px}
  .hidden{display:none!important}
  .footer-actions{position:fixed;left:0;right:0;bottom:0;background:var(--card);
    border-top:1px solid var(--line);box-shadow:0 -4px 20px rgba(16,32,48,.08);z-index:15}
  .fa-inner{max-width:860px;margin:0 auto;padding:12px 20px;display:flex;
    align-items:center;gap:14px;flex-wrap:wrap}
  .fa-inner .msg{flex:1;font-size:13px;color:var(--muted);min-width:160px}
  .btn{border:0;border-radius:10px;padding:12px 20px;font-size:14.5px;font-weight:700;
    cursor:pointer;background:var(--accent);color:var(--accent-ink)}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .thanks{text-align:center;padding:40px 20px}
  .thanks .big{font-size:46px;margin-bottom:10px}
  .thanks h2{margin:0 0 8px}
  .thanks p{color:var(--muted)}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:999px;
    font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:30}
  .toast.show{opacity:1}
  .invalid{border-color:var(--danger)!important}
  .scale-legend{font-size:11.5px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <b id="brandTitle">BPO-Logistics Sector Survey</b>
      <span id="brandSub">Anonymous · for evidence-based regulation</span>
    </div>
    <div class="langsw" role="group" aria-label="Language">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ru">RU</button>
      <button data-lang="uz">O‘Z</button>
    </div>
  </div>
</header>

<main id="main">
  <section class="hero" id="hero"></section>
  <div id="form"></div>
</main>

<div class="footer-actions" id="footerActions">
  <div class="fa-inner">
    <div class="msg" id="footMsg"></div>
    <button class="btn" id="submitBtn"></button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   CONFIG — where responses go.

   To collect into a Google Sheet:
     1. Follow google-sheets/SETUP.md (create sheet, paste Code.gs, deploy).
     2. Paste your Web App URL (ends with /exec) below.
   If submitEndpoint stays null, submissions download as an anonymous JSON file
   instead (offline fallback — also used automatically if the Sheet is unreachable).
   ========================================================================== */
var CONFIG = { submitEndpoint: "https://script.google.com/macros/s/AKfycbzoPtY5x0HqvircICSStYAwrtrcibYPsVyGiF0kDHD_-SmAV_KvN1frN5muMsCWEIS3/exec" };

/* ---- helpers to keep the schema compact ---- */
function L(en, ru, uz){ return {en:en, ru:ru, uz:uz}; }
function O(value, en, ru, uz){ return {value:value, label:L(en, ru, uz)}; }

/* ---- reusable scales ---- */
var SCALE_COMMON = [
  O("very_rare","Very rare","Очень редко","Juda kam"),
  O("rare","Rare","Редко","Kam"),
  O("sometimes","Sometimes","Иногда","Ba’zan"),
  O("common","Common","Часто","Ko‘p"),
  O("very_common","Very common","Очень часто","Juda ko‘p"),
  O("dont_know","Don’t know","Не знаю","Bilmayman")
];
var SCALE_AGREE = [
  O("sd","Strongly disagree","Категорически не согласен","Mutlaqo qo‘shilmayman"),
  O("d","Disagree","Не согласен","Qo‘shilmayman"),
  O("n","Neutral","Нейтрально","Betaraf"),
  O("a","Agree","Согласен","Qo‘shilaman"),
  O("sa","Strongly agree","Полностью согласен","To‘liq qo‘shilaman")
];
var SCALE_SEV = [
  O("none","Not a problem","Не проблема","Muammo emas"),
  O("minor","Minor","Незначительная","Kichik"),
  O("moderate","Moderate","Умеренная","O‘rtacha"),
  O("serious","Serious","Серьёзная","Jiddiy"),
  O("severe","Severe","Критическая","Juda jiddiy")
];
var SCALE_SUPPORT = [
  O("strong_oppose","Strongly oppose","Категорически против","Mutlaqo qarshi"),
  O("oppose","Oppose","Против","Qarshi"),
  O("neutral","Neutral","Нейтрально","Betaraf"),
  O("support","Support","За","Tarafdorman"),
  O("strong_support","Strongly support","Полностью за","To‘liq tarafdorman")
];
var SCALE_FAMILIAR = [
  O("not","Not at all","Совсем не знаком","Umuman tanish emas"),
  O("little","A little","Немного","Ozgina"),
  O("somewhat","Somewhat","Отчасти","Qisman"),
  O("well","Well","Хорошо","Yaxshi"),
  O("very","Very familiar","Очень хорошо","Juda yaxshi")
];

/* ---- roles ---- */
var ROLES = [
  {key:"dispatcher", label:L("Dispatcher","Диспетчер","Dispetcher")},
  {key:"teamlead",   label:L("Team lead / Operations manager","Руководитель группы / операционный менеджер","Guruh rahbari / operatsion menejer")},
  {key:"owner",      label:L("Company owner / CEO / Founder","Владелец / директор / учредитель компании","Kompaniya egasi / rahbari / ta’sischisi")},
  {key:"carrier",    label:L("Carrier / Truck owner (MC holder)","Перевозчик / владелец грузовиков (держатель MC)","Tashuvchi / yuk mashina egasi (MC egasi)")},
  {key:"broker",     label:L("Freight broker","Фрахтовый брокер","Yuk brokeri")},
  {key:"backoffice", label:L("Back office (Safety / Compliance / Billing / Accounting)","Бэк-офис (Safety / комплаенс / биллинг / бухгалтерия)","Back-office (Safety / komplayens / billing / buxgalteriya)")},
  {key:"other",      label:L("Other","Другое","Boshqa")}
];
var DISP = ["dispatcher","teamlead"]; // shares dispatcher-ops questions

/* ============================================================================
   SURVEY SCHEMA
   type: info | single | multi | number | text | textarea | scale
         grid-number (rows+one number col) | grid-scale (rows x scale)
   roles: array of role keys, or "all"
   showIf(a): optional predicate on answers
   ========================================================================== */
var SURVEY = [

/* ---------- S1 : PROFILE ---------- */
{
  id:"s1", roles:"all",
  kicker:L("Section 1","Раздел 1","1-bo‘lim"),
  title:L("About you and your work","О вас и вашей работе","Siz va faoliyatingiz haqida"),
  intro:L("No names, no company names — only your role and how your operation works.",
          "Без имён и названий компаний — только ваша роль и то, как устроена работа.",
          "Ism va kompaniya nomlarisiz — faqat rolingiz va ish qanday tashkil etilgani."),
  questions:[
    {id:"role", type:"single", required:true, roles:"all", control:"rolebar",
     label:L("Your role in the BPO-logistics sector","Ваша роль в секторе BPO-логистики","BPO-logistika sohasidagi rolingiz"),
     options: ROLES.map(function(r){return {value:r.key,label:r.label};})},

    {id:"role_other", type:"text", roles:"all", showIf:function(a){return a.role==="other";},
     label:L("Please specify your role","Уточните вашу роль","Rolingizni aniqlashtiring")},

    {id:"experience", type:"single", roles:"all",
     label:L("How long have you worked in US BPO-logistics?","Как долго вы работаете в BPO-логистике США?","AQSh BPO-logistikasida qancha vaqtdan beri ishlaysiz?"),
     options:[
       O("lt1","Less than 1 year","Менее 1 года","1 yildan kam"),
       O("1_2","1–2 years","1–2 года","1–2 yil"),
       O("3_5","3–5 years","3–5 лет","3–5 yil"),
       O("6p","6+ years","6+ лет","6+ yil")]},

    {id:"company_type", type:"single", roles:"all",
     label:L("Which best describes your organization?","Что лучше всего описывает вашу организацию?","Tashkilotingizni qaysi biri yaxshiroq ifodalaydi?"),
     options:[
       O("itpark","Uzbek dispatch/BPO company — IT-Park resident","Узбекская диспетчерская/BPO-компания — резидент IT-Park","O‘zbek dispetcherlik/BPO kompaniyasi — IT-Park rezidenti"),
       O("uz_noitpark","Uzbek company — not an IT-Park resident","Узбекская компания — не резидент IT-Park","O‘zbek kompaniyasi — IT-Park rezidenti emas"),
       O("us_owned","US-registered company owned by Uzbek(s)","Компания, зарегистрированная в США, с узбекскими владельцами","AQShda ro‘yxatdan o‘tgan, o‘zbek egalariga tegishli kompaniya"),
       O("freelancer","Freelancer / individual","Фрилансер / частное лицо","Frilanser / jismoniy shaxs"),
       O("other","Other","Другое","Boshqa")]},

    {id:"region", type:"single", roles:"all",
     label:L("Region you work from (optional)","Регион, из которого вы работаете (необязательно)","Ishlayotgan hududingiz (ixtiyoriy)"),
     help:L("Kept broad to protect anonymity.","Указывается обобщённо для анонимности.","Anonimlik uchun umumiy ko‘rsatiladi."),
     options:[
       O("tashkent_city","Tashkent city","город Ташкент","Toshkent shahri"),
       O("tashkent_reg","Tashkent region","Ташкентская область","Toshkent viloyati"),
       O("samarkand","Samarkand","Самарканд","Samarqand"),
       O("bukhara","Bukhara / Navoi","Бухара / Навои","Buxoro / Navoiy"),
       O("ferghana","Fergana valley (Andijan/Fergana/Namangan)","Ферганская долина (Андижан/Фергана/Наманган)","Farg‘ona vodiysi (Andijon/Farg‘ona/Namangan)"),
       O("khorezm","Khorezm / Karakalpakstan","Хорезм / Каракалпакстан","Xorazm / Qoraqalpog‘iston"),
       O("south","Kashkadarya / Surkhandarya","Кашкадарья / Сурхандарья","Qashqadaryo / Surxondaryo"),
       O("central","Jizzakh / Syrdarya","Джизак / Сырдарья","Jizzax / Sirdaryo"),
       O("abroad","Outside Uzbekistan / fully remote","За пределами Узбекистана / полностью удалённо","O‘zbekistondan tashqarida / to‘liq masofaviy"),
       O("na","Prefer not to say","Не хочу указывать","Aytishni istamayman")]},

    {id:"team_size", type:"single", roles:"all",
     label:L("How many people work in your company?","Сколько человек работает в вашей компании?","Kompaniyangizda nechta odam ishlaydi?"),
     options:[
       O("solo","Just me","Только я","Faqat men"),
       O("2_5","2–5","2–5","2–5"),
       O("6_20","6–20","6–20","6–20"),
       O("21_50","21–50","21–50","21–50"),
       O("51_100","51–100","51–100","51–100"),
       O("100p","More than 100","Более 100","100 dan ortiq")]},

    {id:"services", type:"multi", roles:"all",
     label:L("Which services does your company provide? (select all)","Какие услуги оказывает ваша компания? (выберите все)","Kompaniyangiz qanday xizmatlar ko‘rsatadi? (barchasini tanlang)"),
     options:[
       O("dispatch","Truck dispatching","Диспетчеризация грузовиков","Yuk mashinalarini dispetcherlash"),
       O("safety","Safety / DOT compliance","Safety / соответствие DOT","Safety / DOT muvofiqligi"),
       O("billing","Billing / invoicing / factoring","Биллинг / выставление счетов / факторинг","Billing / hisob-faktura / faktoring"),
       O("brokerage","Freight brokerage","Фрахтовый брокеридж","Yuk brokerligi"),
       O("onboarding","Carrier packet / onboarding","Оформление перевозчиков / онбординг","Tashuvchilarni rasmiylashtirish / onboarding"),
       O("accounting","Accounting / payroll","Бухгалтерия / расчёт зарплат","Buxgalteriya / ish haqi"),
       O("recruiting","Driver recruiting / HR","Найм водителей / HR","Haydovchilarni yollash / HR"),
       O("eld","ELD / telematics","ELD / телематика","ELD / telematika"),
       O("it","Software / IT for carriers","ПО / IT для перевозчиков","Tashuvchilar uchun dasturiy ta’minot / IT"),
       O("sales","Sales / lead generation","Продажи / лидогенерация","Sotuv / lead generatsiya"),
       O("other","Other","Другое","Boshqa")]},

    {id:"pay_model", type:"multi", roles:"all",
     label:L("How is your company / role paid?","Как оплачивается работа вашей компании / ваша работа?","Kompaniyangiz / ishingiz qanday to‘lanadi?"),
     options:[
       O("pct_load","% of load revenue","% от выручки за груз","Yuk daromadidan %"),
       O("flat_truck","Flat fee per truck / week","Фикс. плата за грузовик / неделю","Har mashina / hafta uchun belgilangan haq"),
       O("per_load","Fixed fee per load","Фикс. плата за груз","Har yuk uchun belgilangan haq"),
       O("salary","Salary / hourly","Оклад / почасовая","Oylik / soatbay"),
       O("mixed","Mixed","Смешанная","Aralash")]},

    {id:"shift", type:"single", roles:"all",
     label:L("Which hours do you mostly work?","В какие часы вы в основном работаете?","Asosan qaysi soatlarda ishlaysiz?"),
     options:[
       O("us_night","US hours (night in Uzbekistan)","Часы США (ночь в Узбекистане)","AQSh vaqti (O‘zbekistonda tun)"),
       O("day","Uzbekistan daytime","Дневное время Узбекистана","O‘zbekiston kunduzi"),
       O("mixed","Mixed / shifts","Смешанно / посменно","Aralash / smenali")]}
  ]
},

/* ---------- S2 : OPERATIONS (role-specific) ---------- */
{
  id:"s2", roles:"all",
  kicker:L("Section 2","Раздел 2","2-bo‘lim"),
  title:L("How your operation works","Как устроена ваша работа","Ishingiz qanday tashkil etilgan"),
  intro:L("These questions change depending on your role.","Эти вопросы меняются в зависимости от вашей роли.","Bu savollar rolingizga qarab o‘zgaradi."),
  questions:[
    /* dispatcher / team lead */
    {id:"d_trucks", type:"number", roles:DISP, min:0,
     label:L("On average, how many trucks / drivers do you dispatch at the same time?","В среднем, сколько грузовиков / водителей вы ведёте одновременно?","O‘rtacha bir vaqtda nechta mashina / haydovchini dispetcherlaysiz?")},
    {id:"d_loads", type:"number", roles:DISP, min:0,
     label:L("About how many loads do you book per week?","Примерно сколько грузов вы бронируете в неделю?","Haftasiga taxminan nechta yuk bron qilasiz?")},
    {id:"d_findloads", type:"multi", roles:DISP,
     label:L("Where do you find loads?","Где вы находите грузы?","Yuklarni qayerdan topasiz?"),
     options:[
       O("dat","DAT","DAT","DAT"),
       O("truckstop","Truckstop","Truckstop","Truckstop"),
       O("highway","Highway / RMIS","Highway / RMIS","Highway / RMIS"),
       O("direct_broker","Direct broker relationships","Прямые контакты с брокерами","Brokerlar bilan bevosita aloqa"),
       O("company_loads","Loads given by my company","Грузы, которые даёт моя компания","Kompaniyam beradigan yuklar"),
       O("shipper_direct","Direct shipper contracts","Прямые контракты с грузоотправителями","Yuk jo‘natuvchilar bilan bevosita shartnoma"),
       O("other","Other","Другое","Boshqa")]},
    {id:"d_whose_mc", type:"single", roles:DISP,
     label:L("Under whose operating authority (MC) do you usually book loads?","Под чьей операционной лицензией (MC) вы обычно бронируете грузы?","Odatda yuklarni kimning MC ruxsatnomasi ostida bron qilasiz?"),
     help:L("Helps us understand how authority is used in practice.","Помогает понять, как на практике используется лицензия.","Amalda ruxsatnoma qanday ishlatilishini tushunishga yordam beradi."),
     options:[
       O("carrier_own","The carrier’s own MC","Собственный MC перевозчика","Tashuvchining o‘z MC’si"),
       O("company_mc","My dispatch company’s MC","MC моей диспетчерской компании","Dispetcherlik kompaniyamning MC’si"),
       O("client_mc","A client’s MC","MC клиента","Mijozning MC’si"),
       O("varies","It varies","По-разному","Har xil")]},
    {id:"d_verify", type:"multi", roles:DISP,
     label:L("How do you check a broker or shipper before hauling? (select all)","Как вы проверяете брокера или грузоотправителя перед перевозкой? (выберите все)","Yuk tashishdan oldin broker yoki jo‘natuvchini qanday tekshirasiz? (barchasini tanlang)"),

/* ============================================================================
   RUNTIME
   ========================================================================== */
var lang = "en";
var answers = {};       // id -> value (single/text/number: scalar; multi: array; grids: object)
var submitted = false;
var deliveredVia = "file"; // "sheet" | "file" — how the last submission was delivered

function t(obj){ return obj ? (obj[lang] || obj.en) : ""; }
function role(){ return answers.role || null; }

function roleMatch(q){
  if(q.roles === "all" || !q.roles) return true;
  var r = role();
  if(!r) return false;
  return q.roles.indexOf(r) !== -1;
}
function visible(q){
  if(!roleMatch(q)) return false;
  if(q.showIf && !q.showIf(answers)) return false;
  return true;
}

/* ---- render ---- */
function render(){
  document.documentElement.lang = lang;
  var u = UI[lang];
  document.getElementById("brandTitle").textContent = u.title;
  document.getElementById("brandSub").textContent = u.sub;
  document.getElementById("footMsg").textContent = CONFIG.submitEndpoint ? u.footHintSend : u.footHint;
  document.getElementById("submitBtn").textContent = u.submit;

  // hero
  document.getElementById("hero").innerHTML =
    '<span class="badge">'+u.badge+'</span>'+
    '<h1>'+u.h1+'</h1>'+
    '<p>'+u.p1+'</p>'+
    '<p>'+u.p2+'</p>'+
    '<div class="anon">'+u.anon+'</div>';

  if(submitted){ renderThanks(); return; }

  var html = "";
  SURVEY.forEach(function(sec){
    // is any question in this section visible?
    var qs = sec.questions.filter(visible);
    // section 1 always shows (role picker). others need a role.
    var showSection = qs.length > 0;
    if(!showSection) return;
    html += '<section class="section" id="'+sec.id+'">';
    html += '<div class="kicker">'+t(sec.kicker)+'</div>';
    html += '<h2>'+t(sec.title)+'</h2>';
    if(sec.intro) html += '<div class="sintro">'+t(sec.intro)+'</div>';
    qs.forEach(function(q){ html += renderQ(q); });
    html += '</section>';

    // after role picker, if no role chosen, show prompt and stop
    if(sec.id === "s1" && !role()){
      html += '<section class="section"><div class="sintro" style="text-align:center;padding:8px 0">'+UI[lang].selectRole+'</div></section>';
    }
  });
  document.getElementById("form").innerHTML = html;
  bind();
}

function reqMark(q){ return q.required ? ' <span class="req" title="'+UI[lang].required+'">*</span>' : ''; }

function renderQ(q){
  var h = '<div class="q" data-qid="'+q.id+'" id="q_'+q.id+'">';
  h += '<div class="qlabel">'+t(q.label)+reqMark(q)+'</div>';
  if(q.help) h += '<div class="help">'+t(q.help)+'</div>';

  if(q.type === "single" || q.type === "multi"){
    var cls = q.control === "rolebar" ? "opts rolebar" : "opts";
    h += '<div class="'+cls+'">';
    q.options.forEach(function(o){
      var checked = isChecked(q,o.value);
      h += '<label class="opt'+(checked?' checked':'')+'">'+
           '<input type="'+(q.type==="single"?"radio":"checkbox")+'" name="'+q.id+'" value="'+o.value+'"'+(checked?' checked':'')+'>'+
           '<span>'+t(o.label)+'</span></label>';
    });
    h += '</div>';
  }
  else if(q.type === "number"){
    var v = (answers[q.id]!=null?answers[q.id]:"");
    h += '<input type="number" min="'+(q.min!=null?q.min:0)+'" step="1" name="'+q.id+'" value="'+v+'" inputmode="numeric">';
  }
  else if(q.type === "text"){
    var tv = answers[q.id]!=null?String(answers[q.id]).replace(/"/g,"&quot;"):"";
    h += '<input type="text" name="'+q.id+'" value="'+tv+'">';
  }
  else if(q.type === "textarea"){
    var ta = answers[q.id]!=null?String(answers[q.id]):"";
    h += '<textarea name="'+q.id+'">'+ta.replace(/</g,"&lt;")+'</textarea>';
  }
  else if(q.type === "scale"){
    h += renderScaleRow(q.id, q.scale, answers[q.id]);
  }
  else if(q.type === "grid-number"){
    h += '<div class="gridwrap"><table class="grid"><tbody>';
    q.rows.forEach(function(r){
      var val = (answers[q.id] && answers[q.id][r.value]!=null) ? answers[q.id][r.value] : "";
      h += '<tr><td>'+t(r.label)+'</td>'+
           '<td class="num"><input type="number" min="0" step="1" inputmode="numeric" '+
           'data-grid="'+q.id+'" data-row="'+r.value+'" value="'+val+'"></td></tr>';
    });
    h += '</tbody></table></div>';
  }
  else if(q.type === "grid-scale"){
    h += '<div class="gridwrap"><table class="grid scale"><thead><tr><th></th>';
    q.scale.forEach(function(s){ h += '<th class="sc">'+t(s.label)+'</th>'; });
    h += '</tr></thead><tbody>';
    q.rows.forEach(function(r){
      var cur = answers[q.id] ? answers[q.id][r.value] : null;
      h += '<tr><td>'+t(r.label)+'</td>';
      q.scale.forEach(function(s){
        var ck = cur===s.value ? ' checked' : '';
        h += '<td class="sc"><input type="radio" name="'+q.id+'__'+r.value+'" '+
             'data-gridscale="'+q.id+'" data-row="'+r.value+'" value="'+s.value+'"'+ck+'></td>';
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';
  return h;
}

function renderScaleRow(id, scale, cur){
  var h = '<div class="opts" style="gap:6px">';
  scale.forEach(function(s){
    var ck = cur===s.value;
    h += '<label class="opt'+(ck?' checked':'')+'" style="padding:8px 12px">'+
         '<input type="radio" name="'+id+'" value="'+s.value+'"'+(ck?' checked':'')+'>'+
         '<span>'+t(s.label)+'</span></label>';
  });
  h += '</div>';
  return h;
}

function isChecked(q,val){
  if(q.type==="single") return answers[q.id]===val;
  return Array.isArray(answers[q.id]) && answers[q.id].indexOf(val)!==-1;
}

/* ---- bind events ---- */
function bind(){
  var form = document.getElementById("form");

  form.querySelectorAll('input[type=radio]').forEach(function(el){
    el.addEventListener("change", function(){
      if(el.dataset.gridscale){
        var id=el.dataset.gridscale, row=el.dataset.row;
        answers[id]=answers[id]||{}; answers[id][row]=el.value;
        markGroupChecked(el);
        return;
      }
      answers[el.name]=el.value;
      // role change → re-render
      if(el.name==="role"){ render(); return; }
      // showIf dependencies may change → re-render lightly
      reRenderIfConditional(el.name);
      markGroupChecked(el);
    });
  });

  form.querySelectorAll('input[type=checkbox]').forEach(function(el){
    el.addEventListener("change", function(){
      var arr = Array.isArray(answers[el.name])?answers[el.name]:[];
      if(el.checked){ if(arr.indexOf(el.value)===-1) arr.push(el.value); }
      else { arr = arr.filter(function(v){return v!==el.value;}); }
      answers[el.name]=arr;
      el.closest(".opt").classList.toggle("checked", el.checked);
    });
  });

  form.querySelectorAll('input[type=number]').forEach(function(el){
    el.addEventListener("input", function(){
      if(el.dataset.grid){
        var id=el.dataset.grid, row=el.dataset.row;
        answers[id]=answers[id]||{};
        if(el.value==="") delete answers[id][row];
        else answers[id][row]=Number(el.value);
      } else {
        answers[el.name]= el.value==="" ? null : Number(el.value);
      }
    });
  });

  form.querySelectorAll('input[type=text], textarea').forEach(function(el){
    el.addEventListener("input", function(){
      answers[el.name]= el.value;
      reRenderIfConditional(el.name);
    });
  });
}

function markGroupChecked(el){
  // update .checked styling within a radio group
  var name = el.name;
  document.querySelectorAll('input[name="'+CSS.escape(name)+'"]').forEach(function(x){
    var opt = x.closest(".opt");
    if(opt) opt.classList.toggle("checked", x.checked);
  });
}

var CONDITIONAL_TRIGGERS = ["role"]; // fields that other questions depend on via showIf
function reRenderIfConditional(name){
  if(CONDITIONAL_TRIGGERS.indexOf(name)!==-1) render();
}

/* ---- thanks screen ---- */
function renderThanks(){
  var u=UI[lang];
  var msg = deliveredVia==="sheet" ? u.thanksPSend : u.thanksP;
  document.getElementById("form").innerHTML =
    '<section class="section thanks">'+
    '<div class="big">'+u.thanksBig+'</div>'+
    '<h2>'+u.thanksH+'</h2>'+
    '<p>'+msg+'</p>'+
    '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">'+
    '<button class="btn ghost" id="copyBtn">'+u.copy+'</button>'+
    '<button class="btn" id="againBtn">'+u.another+'</button>'+
    '</div></section>';
  document.getElementById("footerActions").classList.add("hidden");
  document.getElementById("copyBtn").addEventListener("click", function(){
    navigator.clipboard.writeText(JSON.stringify(buildPayload(),null,2)).then(function(){toast(u.copied);});
  });
  document.getElementById("againBtn").addEventListener("click", function(){
    answers={}; submitted=false;
    document.getElementById("footerActions").classList.remove("hidden");
    window.scrollTo(0,0); render();
  });
}

/* ---- submit ---- */
function buildPayload(){
  return {
    survey:"uz-bpo-logistics-v1",
    responseId:"R-"+Math.random().toString(36).slice(2,10).toUpperCase(),
    submittedAtISO:new Date().toISOString(),
    language:lang,
    role:role(),
    answers:answers
  };
}

function validate(){
  // only role is required
  if(!role()){
    var s1=document.getElementById("q_role");
    if(s1){ s1.scrollIntoView({behavior:"smooth",block:"center"}); }
    toast(UI[lang].needRole);
    return false;
  }
  return true;
}

function doSubmit(){
  if(!validate()) return;
  var payload = buildPayload();
  var btn = document.getElementById("submitBtn");
  if(CONFIG.submitEndpoint){
    btn.disabled = true;
    // Apps Script Web Apps reject CORS preflight, so send a "simple" request:
    // text/plain body + no-cors. The response is opaque but the row is written.
    fetch(CONFIG.submitEndpoint,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    }).then(function(){
      finishSubmit(payload, "sheet");
    }).catch(function(){
      // network unreachable → don't lose the response, save a file
      downloadJSON(payload);
      finishSubmit(payload, "file", true);
    }).finally(function(){ btn.disabled = false; });
  } else {
    downloadJSON(payload);
    finishSubmit(payload, "file");
  }
}
function finishSubmit(payload, via, fellBack){
  submitted = true;
  deliveredVia = via;
  toast(fellBack ? UI[lang].sendFailed : (via==="sheet" ? UI[lang].sent : UI[lang].saved));
  window.scrollTo(0,0);
  render();
}
function downloadJSON(payload){
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="bpo-survey-"+payload.responseId+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},1500);
}

/* ---- toast ---- */
var toastTimer=null;
function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove("show");},2200);
}

/* ---- language switch ---- */
document.querySelectorAll(".langsw button").forEach(function(b){
  b.addEventListener("click", function(){
    document.querySelectorAll(".langsw button").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    lang=b.dataset.lang;
    render();
  });
});
document.getElementById("submitBtn").addEventListener("click", doSubmit);

/* ---- go ---- */
render();
</script>
