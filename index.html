<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Пульс рынка: BPO-логистика Узбекистан — США</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#fff; --ink:#1a2230; --muted:#5b6779; --line:#e2e7ef;
    --accent:#0f6f8c; --accent-ink:#fff; --accent-soft:#e6f2f5;
    --danger:#b3261e; --ok:#1c7a4a;
    --radius:14px; --shadow:0 1px 3px rgba(16,32,48,.06),0 8px 24px rgba(16,32,48,.06);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0f1520;--card:#161d2b;--ink:#e8edf5;--muted:#9aa7ba;--line:#26303f;
      --accent:#37b0cf;--accent-ink:#08131a;--accent-soft:#16303a;--danger:#ff6b64;--ok:#4ecb8b;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);}
  }
  /* three type roles: mono for labels, serif for display, sans for body */
  :root{
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-display:Georgia,"Palatino Linotype",Palatino,"Iowan Old Style",ui-serif,serif;
    --font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6;font-size:17px;
    font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  /* floating glass pill navbar — shown on the first page only */
  .topnav{position:fixed;top:18px;left:0;right:0;z-index:40;display:flex;justify-content:center;
    pointer-events:none}
  body:not(.hero-mode) .topnav{display:none}
  .navpill{pointer-events:auto;display:flex;align-items:center;gap:26px;
    padding:8px 10px 8px 24px;border-radius:999px;
    background:rgba(255,255,255,.60);
    -webkit-backdrop-filter:blur(18px) saturate(170%);
    backdrop-filter:blur(18px) saturate(170%);
    box-shadow:0 10px 34px rgba(16,32,48,.12), inset 0 1px 0 rgba(255,255,255,.8);
    animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  @media (prefers-color-scheme:dark){
    .navpill{background:rgba(22,29,43,.62);
      box-shadow:0 10px 34px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08)}
  }
  .navbrand{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em;
    white-space:nowrap}
  .langsw{display:flex;gap:3px;background:rgba(120,140,160,.14);border:0;border-radius:999px;padding:4px}
  .langsw button{border:0;background:transparent;color:var(--muted);padding:6px 12px;
    border-radius:999px;cursor:pointer;font-size:13px;font-weight:600}
  .langsw button.active{background:var(--accent);color:var(--accent-ink)}
  /* progress "road": dashed track, teal fill, and a truck that drives to the head */
  /* progress road: no card background, narrower than the page, bigger truck */
  .road{position:sticky;top:0;z-index:30;height:76px;overflow:hidden;
    background:var(--bg);box-shadow:none;
    max-width:1180px;margin:0 auto}
  .road-track{position:absolute;left:0;right:0;top:74%;height:2px;transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,var(--line) 0 7px,transparent 7px 14px)}
  .road-fill{position:absolute;left:0;top:74%;height:3px;width:0;transform:translateY(-50%);
    background:var(--accent);border-radius:2px;
    transition:width .9s cubic-bezier(.35,0,.2,1)}
  /* square canvas: the source frame is 512x512 and drawn un-cropped */
  .truck{position:absolute;top:74%;left:0;width:76px;height:76px;pointer-events:none;
    transform:translate(-50%,-78%);
    transition:left .9s cubic-bezier(.35,0,.2,1), transform .3s ease}
  .truck.back{transform:translate(-50%,-78%) scaleX(-1)}
  @media (prefers-reduced-motion:reduce){
    .road-fill,.truck{transition:none}
  }
  main{max-width:1440px;margin:0 auto;padding:18px 40px 120px}
  body.hero-mode main{padding-top:104px;padding-bottom:40px}  /* clear the floating pill */
  .card{background:var(--card);border:0;border-radius:20px;
    padding:30px 32px;box-shadow:var(--shadow);margin-bottom:16px;max-width:860px;margin-inline:auto;
    animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  /* the hero is not a card: no box, no border, no shadow */
  .card.hero-card{max-width:none;padding:0;background:transparent;
    box-shadow:none;border-radius:0;animation:none}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .step{font-family:var(--font-mono);color:var(--accent);font-weight:700;font-size:12.5px;
    letter-spacing:.14em;text-transform:uppercase}
  h1.sect{font-family:var(--font-display);margin:6px 0 8px;font-size:28px;font-weight:600;
    letter-spacing:-.01em}
  .sdesc{color:var(--muted);font-size:16px;margin:10px 0 0;white-space:pre-line;max-width:70ch}

  /* ---------- hero (section S0) ---------- */
  body.hero-mode .road{display:none}       /* no progress bar on the first page */
  .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:70px;align-items:center}
  .hero-kicker{font-family:var(--font-mono);font-size:12.5px;font-weight:700;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:9px}
  .hero-kicker::before{content:"";width:22px;height:1px;background:var(--accent);opacity:.6}
  .hero h1{font-family:var(--font-display);font-size:clamp(34px,3.9vw,56px);line-height:1.07;
    font-weight:600;letter-spacing:-.02em;margin:12px 0 0;text-wrap:balance}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero .lead{font-size:21px;line-height:1.5;color:var(--ink);opacity:.92;margin:18px 0 0;max-width:46ch}
  .hero .body{font-size:16px;line-height:1.62;color:var(--muted);margin:16px 0 0;max-width:64ch}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .chip{font-family:var(--font-mono);font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);background:var(--bg);border:0;
    border-radius:999px;padding:9px 15px;display:inline-flex;align-items:center;gap:7px}
  .chip b{color:var(--accent);font-weight:700}
  .hero-globe{display:flex;align-items:center;justify-content:center}
  .globe-wrap{position:relative;width:100%;max-width:600px;aspect-ratio:1/1;margin-inline:auto}
  #globe{width:100%;height:100%;display:block;cursor:grab;touch-action:none;
    opacity:0;transition:opacity 1.1s ease}
  #globe.on{opacity:1}
  #globe:active{cursor:grabbing}
  .globe-hint{position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
    font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);opacity:.65;white-space:nowrap;pointer-events:none}
  /* big, borderless consent buttons */
  .bigq .qnum{display:none}
  .bigq{border-top:0;padding-top:0}
  .bigq .qlabel{font-family:var(--font-display);font-size:clamp(20px,1.9vw,25px);
    font-weight:600;margin-bottom:16px}
  .bigopts{display:flex;gap:16px;flex-wrap:wrap}
  .bigopt{position:relative;display:inline-flex;align-items:center;gap:12px;cursor:pointer;border:0;
    border-radius:16px;padding:17px 32px;font-size:18px;font-weight:700;
    background:var(--card);color:var(--ink);box-shadow:var(--shadow);
    transition:transform .18s cubic-bezier(.2,.7,.3,1),background .18s,color .18s,box-shadow .18s}
  .bigopt:hover{transform:translateY(-3px) scale(1.02)}
  .bigopt input{position:absolute;opacity:0;pointer-events:none}
  .bigopt .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);flex:none;
    transition:background .18s,transform .18s}
  .bigopt.checked{background:var(--accent);color:var(--accent-ink);
    box-shadow:0 12px 30px rgba(15,111,140,.35)}
  .bigopt.checked .dot{background:var(--accent-ink);transform:scale(1.3)}
  @media (max-width:900px){
    .hero{grid-template-columns:1fr;gap:32px}
    .hero-globe{order:2}
    .globe-wrap{max-width:340px;margin:0 auto}
    .card.hero-card{padding:24px 20px 22px}
    .hero .lead{font-size:16px}
  }
  @media (prefers-reduced-motion:reduce){ #globe{transition:none} }
  .q{padding:24px 0;border-top:1px solid var(--line)}
  .q:first-of-type{border-top:0;padding-top:4px}
  .qnum{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.5px}
  .qlabel{display:block;font-weight:650;font-size:18px;line-height:1.45;margin:4px 0 12px}
  .help{color:var(--muted);font-size:14.5px;margin:-4px 0 12px;font-style:italic}
  .req{color:var(--danger);font-weight:700}
  .opts{display:flex;flex-direction:column;gap:7px}
  .opt{display:flex;align-items:flex-start;gap:12px;border:0;border-radius:13px;
    padding:14px 16px;cursor:pointer;background:var(--bg);
    box-shadow:inset 0 0 0 0 var(--accent);
    transition:transform .16s cubic-bezier(.2,.7,.3,1),background .16s,box-shadow .16s}
  .opt:hover{background:var(--accent-soft);transform:translateX(4px)}
  .opt.checked{background:var(--accent-soft);box-shadow:inset 4px 0 0 0 var(--accent)}
  .opt input{margin-top:3px;accent-color:var(--accent);width:16px;height:16px;flex:none}
  .opt span{font-size:16.5px;line-height:1.45}
  select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);
    color:var(--ink);padding:13px 15px;font-size:16.5px;font-family:inherit}
  textarea{min-height:96px;resize:vertical}
  select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px}
  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  table.grid{border-collapse:collapse;width:100%;min-width:480px;font-size:15.5px}
  table.grid th,table.grid td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left}
  table.grid thead th{background:var(--bg);color:var(--muted);font-size:13px;font-weight:700}
  table.grid th.sc,table.grid td.sc{text-align:center;width:1%;white-space:nowrap}
  table.grid td.sc input{accent-color:var(--accent);width:17px;height:17px}
  table.grid tr:last-child td{border-bottom:0}
  .scale5{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .scale5 .anchor{font-size:13.5px;color:var(--muted);flex:1;min-width:90px}
  .scale5 .anchor.r{text-align:right}
  .scale5 .nums{display:flex;gap:6px}
  .scale5 label{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    border:0;border-radius:12px;padding:12px 20px;background:var(--bg);font-size:17px;font-weight:700;
    transition:transform .15s,background .15s,color .15s}
  .scale5 label:hover{transform:translateY(-2px);background:var(--accent-soft)}
  .scale5 label.checked{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .scale5 label input{accent-color:var(--accent)}
  .maxnote{font-size:13.5px;color:var(--muted);margin-top:8px}
  .err{color:var(--danger);font-size:14.5px;margin-top:8px;font-weight:600}
  .q.invalid{background:rgba(179,38,30,.05);border-radius:10px;padding-left:10px;padding-right:10px}
  .nav{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);
    z-index:15;transition:transform .45s cubic-bezier(.2,.7,.3,1),opacity .35s ease}
  /* no fixed footer anywhere: every section carries its own inline Next */
  .nav{display:none}
  /* once submitted there is no journey left to show */
  body.done-mode .road{display:none}

  /* ================= form layout: locked stepper on the left ================= */
  .formwrap{display:grid;grid-template-columns:248px minmax(0,1fr);gap:46px;align-items:start;
    max-width:1180px;margin:0 auto}
  .formwrap .card{max-width:none;margin-inline:0}
  .stepper{position:sticky;top:96px;display:flex;flex-direction:column;gap:3px}
  .steptitle{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:0 0 14px 12px}
  .stepitem{position:relative;display:flex;align-items:center;gap:13px;padding:10px 12px;
    border-radius:12px;background:none;border:0;text-align:left;font:inherit;width:100%;
    color:var(--muted);cursor:default;
    transition:background .16s,color .16s,transform .16s,opacity .2s}
  .stepitem .num{width:27px;height:27px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-family:var(--font-mono);font-size:12px;font-weight:700;
    background:var(--line);color:var(--muted);transition:background .2s,color .2s,box-shadow .2s}
  .stepitem .nm{font-size:14.5px;line-height:1.32}
  /* completed -> clickable */
  .stepitem.done{color:var(--ink);cursor:pointer}
  .stepitem.done:hover{background:var(--accent-soft);transform:translateX(3px)}
  .stepitem.done .num{background:var(--accent);color:var(--accent-ink)}
  /* current */
  .stepitem.current{color:var(--ink);font-weight:700;background:var(--accent-soft)}
  .stepitem.current .num{background:var(--accent);color:var(--accent-ink);
    box-shadow:0 0 0 4px var(--accent-soft)}
  /* locked -> hollow, dimmed, not clickable */
  .stepitem.locked{opacity:.45}
  .stepitem.locked .num{background:transparent;box-shadow:inset 0 0 0 1.5px var(--line)}
  /* skipped (e.g. incident details when there was no fraud) */
  .stepitem.skipped{opacity:.35}
  .stepitem.skipped .nm{text-decoration:line-through}

  /* inline section nav (replaces the old footer) */
  .sect-nav{display:flex;align-items:center;justify-content:space-between;gap:18px;
    margin-top:32px;padding-top:24px;border-top:1px solid var(--line)}
  .sect-right{display:flex;align-items:center;gap:18px}
  .sect-hint{font-size:14px;color:var(--muted);max-width:32ch;text-align:right}
  body.can-advance .sect-hint{display:none}
  .backlink{background:none;border:0;font:inherit;font-size:15px;color:var(--muted);
    cursor:pointer;padding:10px 2px;transition:color .16s,transform .16s}
  .backlink:hover{color:var(--accent);transform:translateX(-3px)}
  .sect-nav .hero-next{margin-top:0}

  @media (max-width:960px){
    .formwrap{grid-template-columns:1fr;gap:18px}
    .stepper{position:static;flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:6px}
    .stepitem{flex:none;padding:8px}
    .stepitem .nm,.steptitle{display:none}
    .sect-hint{display:none}
    .road{height:62px}
    .truck{width:60px;height:60px}
  }

  /* ---- screen 1: hero fills the viewport, with a quiet scroll cue ---- */
  .hero-screen{min-height:calc(100vh - 132px);display:flex;flex-direction:column;
    justify-content:center;align-items:flex-start}
  .hero{width:100%}
  .scrollcue{--cueH:74px;
    display:inline-flex;flex-direction:column;align-items:flex-start;gap:12px;
    background:none;border:0;padding:0;margin-top:30px;cursor:pointer;
    transition:opacity .5s ease,transform .3s cubic-bezier(.2,.7,.3,1)}
  .scrollcue:hover{transform:translateY(3px)}
  .scrollcue span{font-family:var(--font-mono);font-size:12.5px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--accent);opacity:.9;transition:opacity .25s}
  .scrollcue:hover span{opacity:1}
  .scrollcue i{position:relative;display:block;width:1.5px;height:var(--cueH);border-radius:2px;
    background:linear-gradient(var(--line),transparent);overflow:hidden}
  .scrollcue i::after{content:"";position:absolute;left:0;top:0;width:1.5px;height:20px;
    border-radius:2px;background:var(--accent);
    box-shadow:0 0 10px 1px rgba(15,111,140,.55);
    animation:cue 1.9s cubic-bezier(.65,0,.35,1) infinite}
  @keyframes cue{0%{transform:translateY(-24px)}60%,100%{transform:translateY(var(--cueH))}}

  /* from a comfortable width the cue moves into a reserved lane on the LEFT EDGE
     of the page, running vertically. The lane is padded out of `main` so it can
     never collide with the text. Narrow screens keep it inline under the hero. */
  @media (min-width:1000px){
    body.hero-mode main{padding-left:104px;padding-right:104px}
    .scrollcue{--cueH:132px;
      position:fixed;left:30px;top:50%;transform:translateY(-50%);
      align-items:center;gap:16px;margin-top:0;z-index:25}
    .scrollcue:hover{transform:translateY(-50%) translateX(3px)}
    .scrollcue span{writing-mode:vertical-rl}
  }
  /* a small chevron that bobs — the one overt "go down" signal */
  .scrollcue .chev{display:block;width:9px;height:9px;margin:-3px 0 0 -4px;
    border-right:1.7px solid var(--accent);border-bottom:1.7px solid var(--accent);
    animation:chev 1.8s ease-in-out infinite}
  @keyframes chev{
    0%,100%{transform:rotate(45deg) translate(-2px,-2px);opacity:.45}
    50%    {transform:rotate(45deg) translate(2px,2px);  opacity:1}
  }
  body.consent-seen .scrollcue{opacity:0;pointer-events:none}
  @media (prefers-reduced-motion:reduce){
    .scrollcue .chev{animation:none;transform:rotate(45deg);opacity:.9}
  }

  /* ---- screen 2: question on the left, photo bleeding off the right edge ---- */
  .consent-panel{position:relative;min-height:100vh;display:flex;align-items:center;
    opacity:0;transform:translateY(30px);
    transition:opacity .8s cubic-bezier(.2,.7,.3,1),transform .8s cubic-bezier(.2,.7,.3,1)}
  .consent-panel.in{opacity:1;transform:none}
  .consent-left{position:relative;z-index:2;width:50%;padding-right:64px}
  /* full-bleed: pushes the right edge out to the viewport edge even though the
     container is centred and padded. Relies on `main` being symmetrically padded. */
  .consent-art{position:absolute;top:0;height:100%;
    right:calc(50% - 50vw);width:50vw;
    /* Duotone: the photo sits on a teal gradient and is blended in as pure
       LUMINOSITY, so it keeps the photo's light and shade but takes the brand's
       hue. Done in the background layer, so the caption above is untouched. */
    background-image:var(--art), linear-gradient(158deg,#2c81a0 0%,#0f6f8c 42%,#0a2a3a 100%);
    background-size:cover;background-position:center;background-repeat:no-repeat;
    background-blend-mode:luminosity, normal;
    opacity:0;transform:scale(1.06);
    transition:opacity 1.1s cubic-bezier(.2,.7,.3,1) .12s,
               transform 1.7s cubic-bezier(.2,.7,.3,1) .12s}
  @media (prefers-color-scheme:dark){
    .consent-art{background-image:var(--art),
      linear-gradient(158deg,#2b7f9d 0%,#12617a 45%,#061c27 100%)}
  }
  .consent-panel.in .consent-art{opacity:1;transform:none}
  /* feather the inner edge into the page so there is no hard seam */
  .consent-art::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,var(--bg) 0,rgba(0,0,0,0) 30%)}
  /* bottom scrim so the caption stays legible */
  .consent-art::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(6,16,24,0) 58%,rgba(6,16,24,.62))}
  /* keep the caption on the solid side of the feather, or it washes out */
  .consent-cap{position:absolute;right:46px;bottom:36px;z-index:2;color:#fff;opacity:.94;
    font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    text-shadow:0 1px 10px rgba(0,0,0,.55)}
  @media (max-width:960px){
    .consent-panel{flex-direction:column;justify-content:center;min-height:auto;padding:36px 0}
    .consent-left{width:100%;padding-right:0}
    .consent-art{position:relative;right:auto;width:100%;height:240px;margin-top:28px;
      border-radius:18px;overflow:hidden;transform:none}
    .consent-art::before{display:none}
    .consent-cap{right:18px;bottom:14px}
  }
  .consent-panel .bigopt{opacity:0;transform:translateY(16px);
    transition:opacity .55s cubic-bezier(.2,.7,.3,1) .18s,
               transform .55s cubic-bezier(.2,.7,.3,1) .18s,
               background .18s,color .18s,box-shadow .18s}
  .consent-panel.in .bigopt{opacity:1;transform:none}
  .consent-panel.in .bigopts label:nth-child(2) .dot{transition-delay:0s}
  .consent-panel.in .bigopts label:nth-child(2){transition-delay:.3s,.3s,.18s,.18s,.18s}

  /* ---- the Next reveals itself with a left-to-right wipe ---- */
  .hero-next{margin-top:38px;opacity:0;pointer-events:none}
  body.can-advance .hero-next{pointer-events:auto;
    animation:nextIn .55s cubic-bezier(.2,.75,.3,1) both}
  @keyframes nextIn{
    from{opacity:0;transform:translateY(14px) scale(.94)}
    to  {opacity:1;transform:none}
  }
  .nextbig{position:relative;overflow:hidden;
    display:inline-flex;align-items:center;gap:14px;border:0;cursor:pointer;
    padding:18px 36px;border-radius:999px;font-size:17.5px;font-weight:700;
    font-family:inherit;background:var(--accent);color:var(--accent-ink);
    box-shadow:0 12px 30px rgba(15,111,140,.32);
    transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s,gap .22s}
  .nextbig:hover{transform:translateY(-2px);gap:20px;box-shadow:0 18px 40px rgba(15,111,140,.42)}
  .nextbig .ar{transition:transform .22s}
  .nextbig:hover .ar{transform:translateX(4px)}
  /* the wipe now happens as a light sheen INSIDE the pill, so nothing clips the
     shadow (overflow:hidden never affects an element's own box-shadow) */
  .nextbig::after{content:"";position:absolute;inset:0;pointer-events:none;

/* NOTE: do not name this `history` — that collides with the browser's
   global window.history object and silently breaks navigation. */
var lang="ru", answers={}, current="S0", navStack=[], done=false, deliveredVia="sheet";
var errors={};

function t(o){ return o ? (o[lang]||o.ru||o.en) : ""; }
function S(id){ for(var i=0;i<SECTIONS.length;i++) if(SECTIONS[i].id===id) return SECTIONS[i]; return null; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(s,v){ return String(s).replace("%s",v); }

/* ---------- render ---------- */
function render(){
  var u=UI[lang];
  document.documentElement.lang=lang;

  if(done){ stopGlobe(); renderThanks(); return; }
  document.body.classList.remove("done-mode");

  var sec=S(current);
  setRoad(sec);

  var h;
  if(sec.hero){
    /* split hero: type on the left, interactive globe on the right */
    h ='<section class="card hero-card">';
    h+= '<div class="hero-screen">';
    h+= '<div class="hero">';
    h+=  '<div class="hero-left">';
    h+=   '<div class="hero-kicker">'+t(sec.kicker)+'</div>';
    h+=   '<h1>'+t(sec.heroTitle)+'</h1>';           // contains <em>/<br> — intentional markup
    h+=   '<p class="lead">'+esc(t(sec.lead))+'</p>';
    h+=   '<p class="body">'+esc(t(sec.bodyText))+'</p>';
    h+=   '<div class="chips">'+
            '<span class="chip">⏱ '+esc(u.chipTime)+'</span>'+
            '<span class="chip"><b>🔒</b> '+esc(u.chipAnon)+'</span>'+
            '<span class="chip">'+esc(u.chipLang)+'</span>'+
          '</div>';
    h+=  '</div>';
    h+=  '<div class="hero-globe"><div class="globe-wrap">'+
           '<canvas id="globe"></canvas>'+
           '<div class="globe-hint">'+esc(u.dragHint)+'</div>'+
         '</div></div>';
    h+= '</div>';                                   /* /.hero */
    h+= '<button class="scrollcue" id="scrollcue"><span>'+esc(u.scrollCue)+'</span>'+
         '<i></i><b class="chev"></b></button>';
    h+= '</div>';                                   /* /.hero-screen */

    /* screen 2 — the question, with the road shot beside it */
    h+= '<div class="consent-panel" id="consentPanel">';
    h+=  '<div class="consent-left">';
    sec.questions.forEach(function(q){ h+=renderQ(q); });
    h+=   '<div class="hero-next">'+
            '<button class="nextbig" id="heroNext">'+esc(u.next)+' <span class="ar">&#8594;</span></button>'+
          '</div>';
    h+=  '</div>';
    h+=  '<div class="consent-art" role="img" aria-label="'+esc(u.artCap)+'" '+
           'style="--art:url(data:image/jpeg;base64,'+CONSENT_IMG+')">'+
           '<span class="consent-cap">'+esc(u.artCap)+'</span>'+
         '</div>';
    h+= '</div>';
    h+='</section>';
  } else {
    var card='<section class="card">';
    card+='<div class="step">'+fmt(u.progress,sec.step)+'</div>';
    card+='<h1 class="sect">'+t(sec.title)+'</h1>';
    if(sec.desc) card+='<div class="sdesc">'+esc(t(sec.desc))+'</div>';
    sec.questions.forEach(function(q){ card+=renderQ(q); });
    card+=renderSectNav();
    card+='</section>';
    /* the dead-end "declined" page gets no stepper */
    h = sec.terminal ? card
                     : '<div class="formwrap">'+renderStepper(sec)+card+'</div>';
  }
  document.getElementById("main").innerHTML=h;

  // nav
  var back=document.getElementById("backBtn"), next=document.getElementById("nextBtn");
  back.textContent=u.back; back.style.visibility=navStack.length?"visible":"hidden";
  next.textContent=(sec.terminal||sec.next(answers)==="SUBMIT")?u.submit:u.next;
  document.getElementById("navMsg").textContent="";
  bind();
  updateAdvanceState();

  var fn=document.getElementById("formNext");
  if(fn) fn.addEventListener("click", goNext);
  var bi=document.getElementById("backInline");
  if(bi) bi.addEventListener("click", goBack);
  document.querySelectorAll(".stepitem[data-step]").forEach(function(el){
    el.addEventListener("click", function(){ goToStep(Number(el.dataset.step)); });
  });

  stopGlobe();
  unwireHeroScroll();
  if(sec.hero){ startGlobe(); wireHeroScroll(); }

  window.scrollTo(0,0);
}

/* First page only: the consent screen sits below the fold. It animates in when
   scrolled/swiped into view, and the scroll cue retires once it has been seen. */
var HERO = { onScroll:null, snapT:null };
function unwireHeroScroll(){
  if(HERO.onScroll){ window.removeEventListener("scroll", HERO.onScroll); HERO.onScroll=null; }
  clearTimeout(HERO.snapT);
}

function wireHeroScroll(){
  document.body.classList.remove("consent-seen");
  var panel=document.getElementById("consentPanel");
  var cue=document.getElementById("scrollcue");
  var next=document.getElementById("heroNext");
  if(next) next.addEventListener("click", goNext);
  if(!panel) return;

  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var reveal=function(){
    panel.classList.add("in");
    document.body.classList.add("consent-seen");
  };
  var goPanel=function(){
    reveal();
    panel.scrollIntoView({behavior: reduce ? "auto" : "smooth", block:"start"});
  };
  if(cue) cue.addEventListener("click", goPanel);

  /* A small nudge downward carries you the rest of the way — no half-scrolled
     limbo. Re-arms once you are back at the very top, so scrolling up still works. */
  var snapped=false, snapping=false;
  HERO.onScroll=function(){
    if(!document.body.classList.contains("hero-mode")) return;
    if(snapping) return;
    var y=window.pageYOffset||document.documentElement.scrollTop||0;
    if(snapped){ if(y<6) snapped=false; return; }
    if(y>34){
      snapped=true; snapping=true;
      goPanel();
      clearTimeout(HERO.snapT);
      HERO.snapT=setTimeout(function(){ snapping=false; }, 950);
    }
  };
  window.addEventListener("scroll", HERO.onScroll, {passive:true});

  if(window.IntersectionObserver){
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ reveal(); io.disconnect(); } });

/* The bottom bar is hidden on the first page until consent is chosen, so it
   does not sit there taking space. Everywhere else it is always available. */
function updateAdvanceState(){
  var sec=S(current);
  var ok = sec.hero ? !!answers.S0 : sectionComplete(sec);
  document.body.classList.toggle("can-advance", ok);
  var fn=document.getElementById("formNext");
  if(fn) fn.firstChild.nodeValue = nextLabel()+" ";
}

var LAND_W = 512, LAND_H = 256;
var LAND_BITS = null;
function landBits(){
  if(LAND_BITS) return LAND_BITS;
  var bin = atob(LAND_B64);
  var a = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) a[i] = bin.charCodeAt(i);
  LAND_BITS = a;
  return a;
}
function isLand(lat, lon){
  var bits = landBits();
  var i = Math.floor((lon + 180) / 360 * LAND_W);
  var j = Math.floor((90 - lat) / 180 * LAND_H);
  if(i < 0) i = 0; if(i >= LAND_W) i = LAND_W - 1;
  if(j < 0) j = 0; if(j >= LAND_H) j = LAND_H - 1;
  var idx = j * LAND_W + i;
  return (bits[idx >> 3] >> (idx & 7)) & 1;
}

function ll2v(lat,lon){
  var a=lat*Math.PI/180, b=lon*Math.PI/180;

function slerp(a,b,tt){
  var d=Math.max(-1,Math.min(1,a[0]*b[0]+a[1]*b[1]+a[2]*b[2]));
  var om=Math.acos(d);
  if(om<1e-6) return a.slice();
  var s=Math.sin(om), k1=Math.sin((1-tt)*om)/s, k2=Math.sin(tt*om)/s;
  return [a[0]*k1+b[0]*k2, a[1]*k1+b[1]*k2, a[2]*k1+b[2]*k2];
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);

function startGlobe(){
  var canvas=document.getElementById("globe");
  if(!canvas) return;
  var ctx=null;
  try { ctx=canvas.getContext("2d"); } catch(e) { ctx=null; }
  if(!ctx) return;   // no canvas support -> hero still works, just no globe

  var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* light: white globe with dark navy land dots (matches the reference look)
     dark : deep globe with pale land dots                                     */
  var C = dark
    ? { land:"196,214,236", sphereA:"#1b2433", sphereB:"#0c1119",
        rim:"rgba(150,190,220,0.30)", halo:"55,176,207",
        arc:"90,205,235", chipBg:"#e8edf5", chipInk:"#0b1017", home:"#5fd8f5" }
    : { land:"26,30,54",   sphereA:"#ffffff", sphereB:"#eef1f6",
        rim:"rgba(20,40,70,0.10)",  halo:"120,150,180",
        arc:"15,111,140", chipBg:"#1a1a2e", chipInk:"#ffffff", home:"#0f6f8c" };

  /* sample a Fibonacci sphere, keep only points that fall on land */
  var CAND=24000, PTS=[];
  for(var i=0;i<CAND;i++){
    var y=1-(i/(CAND-1))*2, r=Math.sqrt(Math.max(0,1-y*y));
    var th=Math.PI*(3-Math.sqrt(5))*i;
    var x=Math.cos(th)*r, z=Math.sin(th)*r;
    var lat=Math.asin(y)*180/Math.PI;
    var lon=Math.atan2(z,x)*180/Math.PI;
    if(isLand(lat,lon)) PTS.push([x,y,z]);
  }

  var CITY=GLOBE_CITIES.map(function(c){
    return { name:c.name, home:!!c.home, quiet:!!c.quiet, v:ll2v(c.lat,c.lon) };
  });
  var HOME=CITY[0];
  var ARCS=CITY.slice(1).map(function(c,idx){
    return { a:HOME.v, b:c.v, offset:idx/(CITY.length-1) };
  });

  /* opening view: chosen so Tashkent AND all three US hubs are on the front face,
     with the whole corridor (and the Atlantic/Americas) visible at once */
  var phi=2.0, tilt=0.35, dragging=null, W=0, R=0, cx=0, cy=0;
  var dpr=Math.min(window.devicePixelRatio||1,2);

  function resize(){
    var w=canvas.clientWidth;
    if(!w) return false;
    W=w; canvas.width=Math.round(w*dpr); canvas.height=Math.round(w*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    R=w*0.40; cx=w/2; cy=w/2;
    return true;
  }
  function rot(p){
    var cp=Math.cos(phi), sp=Math.sin(phi);
    var x=p[0]*cp - p[2]*sp, z=p[0]*sp + p[2]*cp, y=p[1];
    var ct=Math.cos(tilt), st=Math.sin(tilt);
    return [x, y*ct - z*st, y*st + z*ct];
  }
  function proj(v,k){ k=k||1; return [cx+v[0]*R*k, cy-v[1]*R*k, v[2]]; }

  function draw(now){
    ctx.clearRect(0,0,W,W);

    // soft outer glow
    var g=ctx.createRadialGradient(cx,cy,R*0.95,cx,cy,R*1.30);
    g.addColorStop(0,"rgba("+C.halo+",0.20)");
    g.addColorStop(1,"rgba("+C.halo+",0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,R*1.30,0,7); ctx.fill();

    // sphere body, lit from the upper-left
    var sg=ctx.createRadialGradient(cx-R*0.40,cy-R*0.44,R*0.05,cx,cy,R*1.06);
    sg.addColorStop(0,C.sphereA); sg.addColorStop(1,C.sphereB);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.fill();

    // limb
    ctx.lineWidth=1; ctx.strokeStyle=C.rim;
    ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.stroke();

    // continents (front hemisphere only)
    for(var i=0;i<PTS.length;i++){
      var v=rot(PTS[i]);
      if(v[2]<=0.03) continue;
      var p=proj(v);
      var a=0.25+v[2]*0.65;                    // fade toward the limb
      ctx.fillStyle="rgba("+C.land+","+a.toFixed(3)+")";
      ctx.beginPath(); ctx.arc(p[0],p[1],0.60+v[2]*0.80,0,7); ctx.fill();
    }

    // great-circle arcs: Tashkent -> US freight hubs
    ARCS.forEach(function(arc){
      var STEPS=64, started=false;
      ctx.beginPath();
      ctx.lineWidth=1.25;
      ctx.strokeStyle="rgba("+C.arc+",0.55)";
      for(var s=0;s<=STEPS;s++){
        var tt=s/STEPS;
        var v=rot(slerp(arc.a,arc.b,tt));
        if(v[2]<=0){ started=false; continue; }   // behind the globe -> break
        var p=proj(v, 1+0.20*Math.sin(Math.PI*tt));
        if(!started){ ctx.moveTo(p[0],p[1]); started=true; } else ctx.lineTo(p[0],p[1]);
      }
      ctx.stroke();

      // travelling pulse
      var tp=((now/2600)+arc.offset)%1;
      var pv=rot(slerp(arc.a,arc.b,tp));
      if(pv[2]>0){
        var pp=proj(pv,1+0.20*Math.sin(Math.PI*tp));
        ctx.fillStyle="rgba("+C.arc+",0.28)";
        ctx.beginPath(); ctx.arc(pp[0],pp[1],5.5,0,7); ctx.fill();
        ctx.fillStyle="rgba("+C.arc+",1)";
        ctx.beginPath(); ctx.arc(pp[0],pp[1],2.1,0,7); ctx.fill();
      }
    });

    // city markers, then label chips with collision avoidance
    var labels=[];
    CITY.forEach(function(c){
      var v=rot(c.v);
      if(v[2]<=0.03) return;
      var p=proj(v), fade=Math.min(1,(v[2]-0.03)/0.25);

      if(c.home){
        var pulse=1+0.45*Math.sin(now/560);
        ctx.strokeStyle="rgba("+C.arc+","+(0.55*fade).toFixed(3)+")";
        ctx.lineWidth=1.3;
        ctx.beginPath(); ctx.arc(p[0],p[1],6*pulse,0,7); ctx.stroke();
      }
      ctx.fillStyle=c.home?C.home:"rgba("+C.arc+","+(0.95*fade).toFixed(3)+")";
      ctx.beginPath(); ctx.arc(p[0],p[1],c.home?3.4:2.3,0,7); ctx.fill();

      if(!c.quiet && fade>0.3) labels.push({c:c,p:p,fade:fade,z:v[2]});
    });

    // nearest labels win; any chip that would overlap one already placed is dropped
    labels.sort(function(a,b){ return (b.c.home?1:0)-(a.c.home?1:0) || b.z-a.z; });
    var placed=[];
    labels.forEach(function(L){
      var fs=L.c.home?9:8.5;
      ctx.font='700 '+fs+'px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace';
      var tw=ctx.measureText(L.c.name).width;
      var padX=6, padY=4, h=fs+padY*2, w=tw+padX*2;
      var bx=L.p[0]-w/2, by=L.p[1]-11-h;
      var box={x:bx,y:by,w:w,h:h};
      for(var k=0;k<placed.length;k++){
        var q=placed[k];
        if(box.x < q.x+q.w+11 && box.x+box.w+11 > q.x &&
           box.y < q.y+q.h+11 && box.y+box.h+11 > q.y) return;  // overlaps -> skip
      }
      placed.push(box);
      ctx.globalAlpha=L.fade*0.95;
      ctx.fillStyle=C.chipBg;
      roundRect(ctx,bx,by,w,h,3); ctx.fill();
      ctx.fillStyle=C.chipInk;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(L.c.name, L.p[0], by+h/2+0.5);
      ctx.globalAlpha=1;
      ctx.textBaseline="alphabetic";
    });

    if(!dragging && !reduce) phi+=0.0016;
    globe.raf=requestAnimationFrame(draw);
  }

  /* ---- drag to spin ----
     Screen-x of a point is proportional to cos(lon + phi), so to make the globe
     follow the cursor to the RIGHT, phi must DECREASE. Likewise dragging DOWN
     must INCREASE tilt. Both were inverted before. Scale by R so the surface
     tracks the pointer at roughly 1:1 regardless of globe size.               */
  function down(e){
    dragging={ x:e.clientX, y:e.clientY, phi:phi, tilt:tilt };
    if(canvas.setPointerCapture) { try { canvas.setPointerCapture(e.pointerId); } catch(err){} }
  }
  function move(e){
    if(!dragging) return;
    var dx=e.clientX-dragging.x, dy=e.clientY-dragging.y;
    phi  = dragging.phi  - dx/R;
    tilt = dragging.tilt + dy/R;
    var LIM=Math.PI/2-0.12;
    if(tilt> LIM) tilt= LIM;
    if(tilt<-LIM) tilt=-LIM;
  }
  function up(){ dragging=null; }
  canvas.addEventListener("pointerdown",down);
  window.addEventListener("pointermove",move,{passive:true});
  window.addEventListener("pointerup",up,{passive:true});
  window.addEventListener("pointercancel",up,{passive:true});

  var ro=null;
  function boot(){
    if(!resize()) return false;
    canvas.classList.add("on");
    globe.raf=requestAnimationFrame(draw);
    return true;
  }
  if(!boot() && window.ResizeObserver){
    ro=new ResizeObserver(function(){ if(boot()){ ro.disconnect(); ro=null; } });
    ro.observe(canvas);
  }
  var onResize=function(){ resize(); };
  window.addEventListener("resize",onResize);

  globe.teardown=function(){
    canvas.removeEventListener("pointerdown",down);
    window.removeEventListener("pointermove",move);
    window.removeEventListener("pointerup",up);
    window.removeEventListener("pointercancel",up);
    window.removeEventListener("resize",onResize);
    if(ro) ro.disconnect();
  };
}

function renderQ(q){
  var u=UI[lang], bad=errors[q.id];
  var h='<div class="q'+(bad?" invalid":"")+(q.big?" bigq":"")+'" id="q_'+q.id+'">';
  h+='<div class="qnum">'+q.id+(q.required?' <span class="req">*</span>':'')+'</div>';
  h+='<label class="qlabel">'+t(q.label)+'</label>';
  if(q.help) h+='<div class="help">'+t(q.help)+'</div>';

  if(q.type==="single"){
    if(q.big){
      h+='<div class="bigopts">';
      q.options.forEach(function(o){
        var ck=answers[q.id]===o.value;
        h+='<label class="bigopt'+(ck?" checked":"")+'">'+
             '<input type="radio" name="'+q.id+'" value="'+o.value+'"'+(ck?" checked":"")+'>'+
             '<span class="dot"></span><span>'+t(o.label)+'</span></label>';
      });
      h+='</div>';
    } else {
      h+='<div class="opts">';
      q.options.forEach(function(o){
        var ck=answers[q.id]===o.value;
        h+='<label class="opt'+(ck?" checked":"")+'"><input type="radio" name="'+q.id+'" value="'+o.value+'"'+(ck?" checked":"")+'><span>'+t(o.label)+'</span></label>';
      });
      h+='</div>';
    }
  }
  else if(q.type==="multi"){
    var cur=answers[q.id]||[];
    h+='<div class="opts">';
    q.options.forEach(function(o){
      var ck=cur.indexOf(o.value)!==-1;
      h+='<label class="opt'+(ck?" checked":"")+'"><input type="checkbox" name="'+q.id+'" value="'+o.value+'"'+(ck?" checked":"")+'><span>'+t(o.label)+'</span></label>';
    });
    h+='</div>';
    if(q.maxSelect) h+='<div class="maxnote">'+fmt(u.maxNote,q.maxSelect)+' ('+cur.length+'/'+q.maxSelect+')</div>';
  }
  else if(q.type==="dropdown"){
    h+='<select name="'+q.id+'"><option value=""></option>';
    q.options.forEach(function(o){
      h+='<option value="'+o.value+'"'+(answers[q.id]===o.value?" selected":"")+'>'+t(o.label)+'</option>';
    });
    h+='</select>';
  }
  else if(q.type==="grid"){
    var g=answers[q.id]||{};
    h+='<div class="gridwrap"><table class="grid"><thead><tr><th></th>';
    q.cols.forEach(function(c){ h+='<th class="sc">'+t(c.label)+'</th>'; });
    h+='</tr></thead><tbody>';
    q.rows.forEach(function(r){
      h+='<tr><td>'+t(r.label)+'</td>';
      q.cols.forEach(function(c){
        var ck=g[r.value]===c.value;
        h+='<td class="sc"><input type="radio" data-grid="'+q.id+'" data-row="'+r.value+'" name="'+q.id+'__'+r.value+'" value="'+c.value+'"'+(ck?" checked":"")+'></td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  else if(q.type==="scale5"){
    h+='<div class="scale5"><div class="anchor">1 — '+t(q.anchorLow)+'</div><div class="nums">';
    for(var i=1;i<=5;i++){
      var ck=String(answers[q.id])===String(i);
      h+='<label class="'+(ck?"checked":"")+'"><input type="radio" name="'+q.id+'" value="'+i+'"'+(ck?" checked":"")+'>'+i+'</label>';
    }
    h+='</div><div class="anchor r">'+t(q.anchorHigh)+' — 5</div></div>';
  }
  else if(q.type==="paragraph"){
    h+='<textarea name="'+q.id+'">'+esc(answers[q.id]||"")+'</textarea>';
  }

  if(bad) h+='<div class="err">'+bad+'</div>';
  h+='</div>';
  return h;
}

/* ---------- bind ---------- */
function bind(){
  var m=document.getElementById("main");

  m.querySelectorAll('input[type=radio]').forEach(function(el){
    el.addEventListener("change",function(){
      if(el.dataset.grid){
        var id=el.dataset.grid;
        answers[id]=answers[id]||{};
        answers[id][el.dataset.row]=el.value;
      } else {
        answers[el.name]=el.value;
      }
      clearErr(el.dataset.grid||el.name);
      markRadios(el.name);
      refreshNextLabel();
      updateAdvanceState();
    });
  });

  m.querySelectorAll('input[type=checkbox]').forEach(function(el){
    el.addEventListener("change",function(){
      var q=findQ(el.name);
      var arr=Array.isArray(answers[el.name])?answers[el.name].slice():[];
      if(el.checked){
        if(q.maxSelect && arr.length>=q.maxSelect){
          el.checked=false;
          toast(fmt(UI[lang].errMax,q.maxSelect));
          return;
        }
        if(arr.indexOf(el.value)===-1) arr.push(el.value);
      } else {
        arr=arr.filter(function(v){return v!==el.value;});
      }
      answers[el.name]=arr;
      el.closest(".opt").classList.toggle("checked",el.checked);
      clearErr(el.name);
      updateAdvanceState();
      if(q.maxSelect){
        var note=el.closest(".q").querySelector(".maxnote");
        if(note) note.textContent=fmt(UI[lang].maxNote,q.maxSelect)+" ("+arr.length+"/"+q.maxSelect+")";
      }
    });
  });

  m.querySelectorAll("select").forEach(function(el){
    el.addEventListener("change",function(){ answers[el.name]=el.value||null; clearErr(el.name);
      updateAdvanceState(); });
  });
  m.querySelectorAll("textarea").forEach(function(el){
    el.addEventListener("input",function(){ answers[el.name]=el.value; updateAdvanceState(); });
  });
}

function markRadios(name){
  document.querySelectorAll('input[name="'+name+'"]').forEach(function(x){
    var o=x.closest(".opt, .bigopt"); if(o) o.classList.toggle("checked",x.checked);
    if(x.parentElement && x.parentElement.tagName==="LABEL" && x.closest(".scale5"))
      x.parentElement.classList.toggle("checked",x.checked);
  });
}
function findQ(id){
  var sec=S(current);
  for(var i=0;i<sec.questions.length;i++) if(sec.questions[i].id===id) return sec.questions[i];
  return {};
}
function clearErr(id){
  if(errors[id]){ delete errors[id];
    var el=document.getElementById("q_"+id);
    if(el){ el.classList.remove("invalid"); var e=el.querySelector(".err"); if(e) e.remove(); }
  }
}
function refreshNextLabel(){
  var sec=S(current), u=UI[lang];
  document.getElementById("nextBtn").textContent=
    (sec.terminal||sec.next(answers)==="SUBMIT")?u.submit:u.next;
}

/* A section is "complete" when every required question in it is answered.
   The Next button only exists once this is true — that is what locks the
   following section. */
function sectionComplete(sec){
  sec = sec || S(current);
  for(var i=0;i<sec.questions.length;i++){
    var q=sec.questions[i];
    if(!q.required) continue;
    var v=answers[q.id];
    if(q.type==="multi"){
      if(!Array.isArray(v) || !v.length) return false;
      if(q.maxSelect && v.length>q.maxSelect) return false;
    } else if(q.type==="grid"){
      var g=v||{};
      for(var r=0;r<q.rows.length;r++) if(!g[q.rows[r].value]) return false;
    } else if(v===undefined || v===null || v==="") return false;
  }
  return true;
}

function nextLabel(){
  var sec=S(current), u=UI[lang];
  return (sec.terminal || sec.next(answers)==="SUBMIT") ? u.submit : u.next;
}

/* left rail: numbered sections, locked until you get to them */
function renderStepper(sec){
  var u=UI[lang];
  var noFraud = answers.F1==="no";
  var h='<aside class="stepper"><div class="steptitle">'+esc(u.steps)+'</div>';
  FORM_STEPS.forEach(function(st, i){
    var cls="stepitem", clickable=false;
    if(st.step===sec.step) cls+=" current";
    else if(st.step===5 && noFraud && sec.step>4) cls+=" skipped";
    else if(st.step<sec.step){ cls+=" done"; clickable=true; }
    else cls+=" locked";
    h+='<button class="'+cls+'"'+(clickable?' data-step="'+st.step+'"':' disabled')+'>'+
         '<span class="num">'+(i+1)+'</span>'+
         '<span class="nm">'+t(st.label)+'</span>'+
       '</button>';
  });
  h+='</aside>';
  return h;
}

/* inline nav at the foot of each section (there is no fixed footer any more) */
function renderSectNav(){
  var u=UI[lang];
  var h='<div class="sect-nav">';
  h+= navStack.length
        ? '<button class="backlink" id="backInline">&#8592; '+esc(u.back)+'</button>'
        : '<span></span>';
  h+= '<div class="sect-right">'+
        '<span class="sect-hint">'+esc(u.completeHint)+'</span>'+
        '<div class="hero-next">'+
          '<button class="nextbig" id="formNext">'+esc(nextLabel())+' <span class="ar">&#8594;</span></button>'+
        '</div>'+
      '</div>';
  h+='</div>';
  return h;
}

/* jump back to an already-completed step */
function goToStep(target){
  var idx=-1;
  for(var i=0;i<navStack.length;i++){
    if(S(navStack[i]).step===target){ idx=i; break; }
  }
  if(idx<0) return;
  var id=navStack[idx];
  navStack=navStack.slice(0,idx);
  current=id; errors={};
  render();
}

/* ---------- validation ---------- */
function validate(){
  var sec=S(current), u=UI[lang], ok=true;
  errors={};
  sec.questions.forEach(function(q){
    if(!q.required) return;
    var v=answers[q.id];
    if(q.type==="multi"){
      if(!Array.isArray(v)||!v.length){ errors[q.id]=u.errRequired; ok=false; }
      else if(q.maxSelect && v.length>q.maxSelect){ errors[q.id]=fmt(u.errMax,q.maxSelect); ok=false; }
    }
    else if(q.type==="grid"){
      var g=v||{}, all=q.rows.every(function(r){ return g[r.value]; });
      if(!all){ errors[q.id]=u.errGrid; ok=false; }
    }
    else if(v===undefined||v===null||v===""){ errors[q.id]=u.errRequired; ok=false; }
  });
  if(!ok){
    render();
    toast(u.fixErrors);
    var first=document.querySelector(".q.invalid");
    if(first) first.scrollIntoView({behavior:"smooth",block:"center"});
  }
  return ok;
}

/* ---------- navigation ---------- */
function goNext(){
  var sec=S(current);
  if(!validate()) return;
  var nxt=sec.terminal ? "SUBMIT" : sec.next(answers);
  if(nxt==="SUBMIT"){ doSubmit(); return; }
  navStack.push(current);
  current=nxt;
  errors={};
  render();
}
function goBack(){
  if(!navStack.length) return;
  current=navStack.pop();
  errors={};
  render();
}

/* ---------- submit ---------- */
function buildPayload(){
  return {
    survey:"uz-bpo-pulse-w1",
    responseId:"R-"+Math.random().toString(36).slice(2,10).toUpperCase(),
    submittedAtISO:new Date().toISOString(),
    language:lang,
    consent:answers.S0||"",
    role:answers.P5||"",
    answers:answers
  };
}
function doSubmit(){
  var payload=buildPayload();
  var btn=document.getElementById("nextBtn");
  if(CONFIG.submitEndpoint){
    btn.disabled=true;
    fetch(CONFIG.submitEndpoint,{method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)})
    .then(function(){ finish("sheet",false); })
    .catch(function(){ downloadJSON(payload); finish("file",true); })
    .finally(function(){ btn.disabled=false; });
  } else {
    downloadJSON(payload); finish("file",false);
  }
}
function finish(via,fell){
  done=true; deliveredVia=via;
  toast(fell?UI[lang].sendFail:(via==="sheet"?UI[lang].sent:UI[lang].saved));
  render();
}
function downloadJSON(p){
  var b=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(b), a=document.createElement("a");
  a.href=url; a.download="bpo-pulse-"+p.responseId+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){URL.revokeObjectURL(url);},1500);
}
function renderThanks(){
  var u=UI[lang];
  var h='<section class="card thanks"><div class="big">✅</div><h2>'+u.thanksH+'</h2><p>'+u.thanksP+'</p>';
  if(answers.K2==="yes"){
    h+='<div class="anon" style="text-align:left;margin-top:18px">'+u.thanksContact;
    if(CONFIG.contactFormUrl)
      h+=' <a href="'+CONFIG.contactFormUrl+'" target="_blank" rel="noopener">'+u.contactLink+'</a>';
    h+='</div>';
  }
  h+='</section>';
  document.getElementById("main").innerHTML=h;
  document.getElementById("nav").style.display="none";
  /* the survey is over: retire the progress road and park the truck */
  document.body.classList.remove("hero-mode","can-advance");
  document.body.classList.add("done-mode");
  var vid=document.getElementById("truckVid");
  if(vid) vid.pause();
  window.scrollTo(0,0);
}

/* ============================================================================
   Progress truck. animations/truck.mp4 is inlined as a data URI so index.html
   stays a single self-contained file. H.264 has no alpha, so the white
   background is chroma-keyed out per frame in canvas; the black line-art is
   recoloured to the theme ink (and inverted in dark mode) while the teal cargo
   stripes are preserved. The truck drives only while the progress bar animates.

var TRUCK = { raf:null, stopT:null, dark:false, lastStep:0, ready:false };

/* full frame: this truck bounces inside the frame, so any tight crop clips it */
var TRUCK_CROP = { x:0, y:0, w:512, h:512 };

function initTruck(){
  var vid=document.getElementById("truckVid");
  var cv=document.getElementById("truck");
  if(!vid||!cv) return;
  var ctx=null;
  try { ctx=cv.getContext("2d"); } catch(e){ return; }
  if(!ctx) return;

  vid.src="data:video/mp4;base64,"+TRUCK_B64;
  TRUCK.dark = !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  if(window.matchMedia){
    var mq=window.matchMedia("(prefers-color-scheme: dark)");
    var onScheme=function(e){ TRUCK.dark=e.matches; };
    if(mq.addEventListener) mq.addEventListener("change",onScheme);
    else if(mq.addListener) mq.addListener(onScheme);
  }

  var C=TRUCK_CROP;
  function frame(){
    if(vid.readyState>=2 && vid.videoWidth){
      TRUCK.ready=true;
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(vid, C.x,C.y,C.w,C.h, 0,0,cv.width,cv.height);
      var img=ctx.getImageData(0,0,cv.width,cv.height), d=img.data;
      var ink = TRUCK.dark ? 232 : 26;
      for(var i=0;i<d.length;i+=4){
        var r=d[i], g=d[i+1], b=d[i+2];
        var mx=r>g?(r>b?r:b):(g>b?g:b);
        var mn=r<g?(r<b?r:b):(g<b?g:b);
        var sat=mx-mn, lum=(r+g+b)/3;
        if(sat<30){
          /* greyscale: white -> transparent (soft edge), black lines -> theme ink */
          var a=(250-lum)/55; a=a<0?0:(a>1?1:a);
          d[i+3]=(a*255)|0;
          d[i]=d[i+1]=d[i+2]=ink;
        }
        /* saturated pixels (the teal cargo stripes) are left untouched */
      }
      ctx.putImageData(img,0,0);
    }
    TRUCK.raf=requestAnimationFrame(frame);
  }
  frame();
}

/* the truck animation loops continuously while the road is visible */
function driveTruck(){
  var vid=document.getElementById("truckVid");
  if(!vid) return;
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  if(vid.paused){ var p=vid.play(); if(p && p.catch) p.catch(function(){}); }
}

/* the hero has no road; pause there and resume on every other section */
function setRoad(sec){
  var hero=!!sec.hero;
  document.body.classList.toggle("hero-mode", hero);
  var vid=document.getElementById("truckVid");
  if(hero){ if(vid) vid.pause(); return; }
  updateRoad(sec.step);
}

/* move the fill + truck to the given step (1..9) */
function updateRoad(step){
  var pct=Math.round(step/9*100);
  var fill=document.getElementById("pbar");
  var truck=document.getElementById("truck");
  if(fill) fill.style.width=pct+"%";
  if(truck){
    truck.classList.toggle("back", step<TRUCK.lastStep);   /* face left when going back */
    truck.style.left=pct+"%";
  }
  driveTruck();
  TRUCK.lastStep=step;
}

/* ---------- toast ---------- */
var tTimer=null;
function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(tTimer);
  tTimer=setTimeout(function(){ el.classList.remove("show"); },2600);
}

/* ---------- language ---------- */
document.querySelectorAll(".langsw button").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".langsw button").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    lang=b.dataset.lang;
    errors={};
    render();
  });
});
initTruck();
document.getElementById("nextBtn").addEventListener("click",goNext);
document.getElementById("backBtn").addEventListener("click",goBack);

render();
